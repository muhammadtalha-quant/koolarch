remember_window_size no
background_opacity    0.8

font_family      JetBrainsMono Nerd Font Mono
bold_font        JetBrainsMono Nerd Font Mono
italic_font      JetBrainsMono Nerd Font Mono
bold_italic_font JetBrainsMono Nerd Font Mono
font_size        14.0

confirm_os_window_close 0
enable_audio_bell no
scrollbar never
scrollback_lines 100000


enabled_layouts splits

# Keybindings
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard


# Scrollback
map ctrl+shift+up   scroll_line_up
map ctrl+shift+down scroll_line_down
map page_up         scroll_page_up
map page_down       scroll_page_down

# Window management
map ctrl+shift+enter launch --location=hsplit
map ctrl+alt+enter   launch --location=vsplit
map ctrl+shift+w     close_window
map ctrl+shift+]     next_window
map ctrl+shift+[     previous_window
map ctrl+left        neighboring_window left
map ctrl+right       neighboring_window right
map ctrl+up          neighboring_window up
map ctrl+down        neighboring_window down
map shift+left        resize_window narrower
map shift+right       resize_window wider
map shift+up          resize_window taller
map shift+down        resize_window shorter 3
map ctrl+home        resize_window reset



# Tab management
map ctrl+shift+t     new_tab
map ctrl+shift+q     close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab

# Font size
map ctrl+shift+equal  change_font_size all +2.0
map ctrl+shift+minus  change_font_size all -2.0
map ctrl+shift+backspace change_font_size all 0


# BEGIN_KITTY_THEME
# Noctalia
include current-theme.conf
# END_KITTY_THEME